version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: career-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_DATABASE: career_planning
      MYSQL_USER: ${DB_USER:-career_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    restart: unless-stopped

  backend:
    build: .
    container_name: career-backend
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: career_planning
      DB_USER: ${DB_USER:-career_user}
      DB_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./:/app
    restart: unless-stopped

volumes:
  mysql_data:
